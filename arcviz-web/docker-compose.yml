version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arcviz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arcviz
      POSTGRES_PASSWORD: arcviz_dev_password
      POSTGRES_DB: arcviz
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcviz -d arcviz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcviz-network

  redis:
    image: redis:7-alpine
    container_name: arcviz-redis
    restart: unless-stopped
    command: redis-server --requirepass arcviz_redis_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcviz-network

  # Optional: Redis Commander for Redis GUI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: arcviz-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:arcviz-redis:6379:0:arcviz_redis_password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - arcviz-network
    profiles:
      - tools

  # Optional: pgAdmin for PostgreSQL GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: arcviz-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@arcviz.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - arcviz-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  arcviz-network:
    driver: bridge
