name: Release

# Signed, verifiable releases: binaries + SHA256SUMS + GitHub build
# provenance attestations. Qualified environments pin a tag and verify
# both (docs/qualification/TOOL_QUALIFICATION.md §7, docs/VERSIONING.md).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: arclang-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: arclang-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: arclang-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Test
        run: cargo test
        if: matrix.target != 'x86_64-apple-darwin'

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/arclang ${{ matrix.asset }}
          tar czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.asset }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum arclang-*.tar.gz > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "ArcLang ${GITHUB_REF_NAME}" \
            --generate-notes \
            arclang-*.tar.gz SHA256SUMS
