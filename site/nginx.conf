server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/html text/css application/javascript application/wasm
               application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # wasm-bindgen module + inline explorer iframe (srcdoc) need script/style;
    # everything is same-origin or inline by design — no external hosts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src 'self' data: about:; connect-src 'self'; object-src 'none'; base-uri 'self'" always;

    # Immutable caching for the wasm bundle and assets
    location /playground/pkg/ {
        add_header Cache-Control "public, max-age=86400";
        types { application/wasm wasm; application/javascript js; }
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=86400";
    }

    # HTML: always revalidate
    location ~ \.html$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
